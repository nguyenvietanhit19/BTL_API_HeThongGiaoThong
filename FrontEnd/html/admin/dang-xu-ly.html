<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xử lý - Giao Thông Cộng Đồng</title>
    <link rel="stylesheet" href="/FrontEnd/css/common.css">
    <link rel="stylesheet" href="/FrontEnd/css/admin/admin.css">
</head>
<body>
    <div id="topbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <h1 id="topbar-title" style="display: none;">GiaoThongAn - Đang xử lý</h1>
        
        <div class="page-header">
            <h2>Tiến độ khắc phục sự cố</h2>
            
            <div class="filters">
                <input type="text" class="filter-search" placeholder="Tìm mã BC, địa chỉ...">
                <select class="filter-category">
                    <option value="">Tất cả loại sự cố</option>
                </select>
                <input type="date" class="filter-date">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>MÃ BC</th>
                        <th>SỰ CỐ & ĐỊA CHỈ</th>
                        <th>NHÂN VIÊN PHỤ TRÁCH</th>
                        <th>NGÀY GIAO VIỆC</th>
                        <th>TRẠNG THÁI</th>
                        <th>HÀNH ĐỘNG</th>
                    </tr>
                </thead>
                <tbody id="table-body-dang-xu-ly">
                </tbody>
            </table>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/FrontEnd/js/api.js"></script>
<script src="/FrontEnd/js/pagination.js"></script>
<script src="/FrontEnd/js/pages/tongquan.js"></script>
<script src="/FrontEnd/js/pages/reports.js"></script>
<script src="/FrontEnd/js/pages/assignment.js"></script>
<script src="/FrontEnd/js/pages/users.js"></script>
<script src="/FrontEnd/js/pages/nhanvien.js"></script>
<script src="/FrontEnd/js/pages/profile.js"></script>
<script src="/FrontEnd/js/layout.js"></script>
</body>
</html>
