<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chờ duyệt - Giao Thông Cộng Đồng</title>
    <link rel="stylesheet" href="/FrontEnd/css/common.css">
    <link rel="stylesheet" href="/FrontEnd/css/admin/admin.css">
</head>

<body>
    <div id="topbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="page-header">
            <h1 id="topbar-title" style="display: none;">GiaoThôngAn - Chờ duyệt báo cáo</h1>
            <h2>Danh sách báo cáo chờ duyệt</h2>
            <div class="filters">
                <input type="text" id="search-report" placeholder="Tìm theo tiêu đề, địa chỉ...">
                <select id="filter-category">
                    <option value="">Tất cả loại sự cố</option>
                    <option value="Ổ gà">Ổ gà</option>
                    <option value="Ngập nước">Ngập nước</option>
                    <option value="Đèn tín hiệu hỏng">Đèn tín hiệu hỏng</option>
                    <option value="Tai nạn">Tai nạn</option>
                    <option value="Vật cản">Vật cản</option>
                    <option value="Khác">Khác</option>
                </select>
                <input type="date" id="filter-date">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>MÃ BC</th>
                        <th>SỰ CỐ & ĐỊA CHỈ</th>
                        <th>LOẠI SỰ CỐ</th>
                        <th>NGƯỜI BÁO CÁO</th>
                        <th>THỜI GIAN GỬI</th>
                        <th>HÀNH ĐỘNG</th>
                    </tr>
                </thead>
                <tbody id="table-body-cho-duyet">
                </tbody>
            </table>
        </div>

        <div id="confirmApproveModal" class="modal" style="display:none; position:fixed; inset:0; z-index:9999;">
            <div class="modal-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(2px);"></div>
            <div class="modal-content" style="position:relative; max-width:450px; margin:80px auto; background:#fff; border-radius:12px; padding:25px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
                <h3 style="margin-top:0; color:#333; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Xác nhận duyệt</h3>
                <p id="confirm-approve-text" style="color:#444; font-size:15px; margin: 20px 0 25px 0;">Bạn có chắc chắn muốn duyệt báo cáo này?</p>
                <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:12px;">
                    <button id="cancel-approve-btn" style="padding:8px 16px; border:1px solid #ddd; background:#f8f9fa; border-radius:6px; cursor:pointer; color:#333; font-weight: 500;">Hủy bỏ</button>
                    <button id="confirm-approve-btn" style="padding:8px 16px; border:none; background:#0d6efd; border-radius:6px; cursor:pointer; color:#fff; font-weight:bold;">Đồng ý duyệt</button>
                </div>
            </div>
        </div>

        <div id="rejectModal" class="modal" style="display:none; position:fixed; inset:0; z-index:9999;">
            <div class="modal-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(2px);"></div>
            <div class="modal-content" style="position:relative; max-width:500px; margin:80px auto; background:#fff; border-radius:12px; padding:25px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
                <h3 style="margin-top:0; color:#dc3545; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Từ chối báo cáo</h3>
                <p style="color:#555; font-size:14px; margin: 15px 0 10px 0;">Vui lòng nhập lý do từ chối (bắt buộc, ít nhất 3 ký tự):</p>

                <textarea id="reject-reason" maxlength="500" rows="4" placeholder="Nhập lý do tại đây để người dùng biết..."
                          style="width:100%; box-sizing:border-box; padding:12px; border:1px solid #ccc; border-radius:8px; font-size:14px; font-family:inherit; resize:vertical; outline:none;"></textarea>

                <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
                    <button id="cancel-reject-btn" style="padding:8px 16px; border:1px solid #ddd; background:#f8f9fa; border-radius:6px; cursor:pointer; color:#333; font-weight: 500;">Hủy bỏ</button>
                    <button id="confirm-reject-btn" disabled
                            style="padding:8px 16px; border:none; background:#dc3545; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer;"
                            onmouseover="if(this.disabled) this.style.cursor='not-allowed'; else this.style.cursor='pointer';"
                            class="btn-reject-submit">Xác nhận từ chối</button>
                </div>
            </div>
        </div>
    </div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/FrontEnd/js/api.js"></script>
<script src="/FrontEnd/js/pages/tongquan.js"></script>
<script src="/FrontEnd/js/pages/reports.js"></script>
<script src="/FrontEnd/js/pages/assignment.js"></script>
<script src="/FrontEnd/js/pages/users.js"></script>
<script src="/FrontEnd/js/pages/nhanvien.js"></script>
<script src="/FrontEnd/js/pages/profile.js"></script>
<script src="/FrontEnd/js/layout.js"></script>
</body>

</html>
