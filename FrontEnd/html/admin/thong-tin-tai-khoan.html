<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Giao Thông Cộng Đồng</title>
    <link rel="stylesheet" href="/FrontEnd/css/admin/admin.css">
    <link rel="stylesheet" href="/FrontEnd/css/admin/thong-tin-tai-khoan.css">
    <link rel="stylesheet" href="/FrontEnd/css/common.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div id="topbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="page-header">
            <h1 id="topbar-title" style="display: none;">GiaoThôngAn - Thông tin cá nhân</h1>
            <div class="breadcrumb">Thông tin tài khoản</div>
            <h2>Hồ sơ cá nhân</h2>
        </div>

        <div class="profile-grid">
            <div class="profile-card profile-summary">
                <div class="avatar-wrapper">
                    <img src="/FE/img/default-avatar.png" alt="Avatar" id="profile-avatar">
                    <label for="upload-avatar" class="upload-badge">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="upload-avatar" hidden accept="image/*">
                </div>
                <h3 id="display-name">Nguyễn Việt Anh</h3>
                <p class="user-role badge badge-assigned">Quản trị viên</p>
                <div class="join-date">Thành viên từ: 15/04/2024</div>
            </div>

            <div class="profile-card profile-details">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="info">Thông tin cơ bản</button>
                    <button class="tab-btn" data-tab="password">Đổi mật khẩu</button>
                </div>

                <div id="info-tab" class="tab-content active">
                    <form id="form-update-profile">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Họ và tên</label>
                                <input type="text" value="Nguyễn Việt Anh" placeholder="Nhập họ tên">
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại</label>
                                <input type="text" value="0987654321" placeholder="Nhập số điện thoại">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Địa chỉ Email</label>
                            <input type="email" value="vietanh.it@gmail.com" readonly style="background: #f4f7fe;">
                            <small>Liên hệ quản trị viên để thay đổi email</small>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-action btn-assign">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>

                <div id="password-tab" class="tab-content">
                    <form id="form-change-password">
                        <div class="form-group">
                            <label>Mật khẩu hiện tại</label>
                            <input type="password" placeholder="********">
                        </div>
                        <div class="form-group">
                            <label>Mật khẩu mới</label>
                            <input type="password" placeholder="Ít nhất 8 ký tự">
                        </div>
                        <div class="form-group">
                            <label>Xác nhận mật khẩu mới</label>
                            <input type="password" placeholder="********">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-action btn-assign">Cập nhật mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/FrontEnd/js/layout.js"></script>
    <script src="/FrontEnd/js/tttk.js"></script>
</body>
</html>
