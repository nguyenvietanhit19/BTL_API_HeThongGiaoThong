<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GiaoThôngAn - Chờ nghiệm thu</title>
    <link rel="stylesheet" href="/FrontEnd/css/common.css">
    <link rel="stylesheet" href="/FrontEnd/css/admin/admin.css">
</head>
<body>
    <div id="topbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="view-list">
            <div class="page-header" style="margin-bottom: 20px;">
                <h2 style="font-size: 18px; font-weight: 600;">Danh sách chờ nghiệm thu</h2>
            </div>
            <div class="table-container">
                <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px; border: 1px solid #eaeaea;">
                    <thead>
                        <tr>
                            <th>MÃ BC</th>
                            <th>SỰ CỐ & ĐỊA CHỈ</th>
                            <th>NHÂN VIÊN XỬ LÝ</th>
                            <th>NGÀY HOÀN THÀNH</th>
                            <th>HÀNH ĐỘNG</th>
                        </tr>
                    </thead>
                    <tbody id="table-body-nghiem-thu">
                        <tr class="report-row" style="cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: 0.2s;">
                            <td style="padding: 16px; font-weight: 600;"></td>
                            <td style="padding: 16px;"></td>
                            <td style="padding: 16px;"></td>
                            <td style="padding: 16px;"></td>
                            <td style="padding: 16px;">
                                <button class="btn-action btn-accept" data-id="5">Duyệt</button> 
                                <button class="btn-action btn-reject-nt" data-id="5">Không duyệt</button>
                                <button class="btn-action btn-view" data-id="5">Xem</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-detail" style="display: none;">
            <button id="btn-back-to-list" class="btn-back">← Quay lại danh sách</button>
            
            <div class="breadcrumb">Chờ nghiệm thu › <strong id="bc-breadcrumb">Báo cáo #5...</strong></div>
            <div class="report-header">
                <div class="report-title"><h2 id="bc-tieu-de">...</h2><p id="bc-dia-chi-time">...</p></div>
                <div class="status-badge" id="bc-trang-thai">...</div>
            </div>

            <div class="alert-warning" id="bc-canh-bao" style="display: none;"></div>

            <div class="info-panels">
                <div class="panel">
                    <h3>THÔNG TIN BÁO CÁO</h3>
                    <div class="info-list">
                        <div class="info-row"><span class="info-label">Loại sự cố</span><span class="info-value" id="info-loai">...</span></div>
                        </div>
                </div>
                <div class="panel">
                    <h3>THÔNG TIN XỬ LÝ</h3>
                    <div class="info-list">
                        <div class="info-row"><span class="info-label">Nhân viên</span><span class="info-value" id="info-nhan-vien">...</span></div>
                    </div>
                </div>
            </div>

            <div class="image-section">
                <div class="section-header"><h3>ẢNH BÁO CÁO GỐC</h3></div>
                <div class="image-grid" id="grid-anh-goc"></div>
            </div>

            <div class="image-section">
                <div class="section-header"><h3>SO SÁNH TRƯỚC VÀ SAU SỬA CHỮA</h3></div>
                <div class="image-grid" id="grid-anh-so-sanh"></div>
            </div>

            <div class="content-section">
                <div class="section-header"><h3>LỊCH SỬ XỬ LÝ</h3></div>
                <div class="timeline" id="bc-timeline"></div>
            </div>
        </div>
    </div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/FrontEnd/js/api.js"></script>
<script src="/FrontEnd/js/pagination.js"></script>
<script src="/FrontEnd/js/pages/tongquan.js"></script>
<script src="/FrontEnd/js/pages/reports.js"></script>
<script src="/FrontEnd/js/pages/assignment.js"></script>
<script src="/FrontEnd/js/pages/users.js"></script>
<script src="/FrontEnd/js/pages/nhanvien.js"></script>
<script src="/FrontEnd/js/pages/profile.js"></script>
<script src="/FrontEnd/js/layout.js"></script>
</body>
</html>
