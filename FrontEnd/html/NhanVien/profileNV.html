<div class="profile-page">
    <section class="profile-hero">
        <div class="profile-hero__avatar" id="profile-avatar">N</div>
        <div class="profile-hero__content">
            <p class="profile-hero__eyebrow">Tài khoản nhân viên</p>
            <h2 id="display-name">Đang tải...</h2>
            <div class="profile-hero__meta">
                <span class="profile-role-badge" id="profile-role">Nhân viên</span>
                <span id="profile-date">Thành viên từ --/--/----</span>
            </div>
        </div>
    </section>

    <div class="profile-grid">
        <section class="profile-card">
            <div class="profile-card__header">
                <div>
                    <h3>Thông tin cá nhân</h3>
                    <p>Dữ liệu tài khoản hiện tại của bạn.</p>
                </div>
            </div>

            <div class="profile-info-list">
                <div class="profile-info-row">
                    <span class="profile-info-row__label">Họ và tên</span>
                    <span class="profile-info-row__value" id="profile-name-text">--</span>
                </div>
                <div class="profile-info-row">
                    <span class="profile-info-row__label">Email</span>
                    <span class="profile-info-row__value" id="profile-email">--</span>
                </div>
                <div class="profile-info-row">
                    <span class="profile-info-row__label">Vai trò</span>
                    <span class="profile-info-row__value" id="profile-role-text">--</span>
                </div>
                <div class="profile-info-row">
                    <span class="profile-info-row__label">Mã người dùng</span>
                    <span class="profile-info-row__value" id="profile-user-id">--</span>
                </div>
            </div>
        </section>

        <section class="profile-card">
            <div class="profile-card__header">
                <div>
                    <h3>Cập nhật thông tin</h3>
                    <p>Bạn có thể thay đổi tên hiển thị dùng trong hệ thống.</p>
                </div>
            </div>

            <form id="form-update-profile" class="profile-form">
                <div class="profile-field">
                    <label for="full-name">Họ và tên</label>
                    <input type="text" id="full-name" placeholder="Nhập họ và tên">
                </div>

                <div class="profile-field">
                    <label for="profile-email-readonly">Email</label>
                    <input type="text" id="profile-email-readonly" readonly>
                </div>

                <div class="profile-actions">
                    <button type="submit" class="profile-btn profile-btn--primary">Lưu thay đổi</button>
                </div>
            </form>
        </section>
    </div>

</div>
