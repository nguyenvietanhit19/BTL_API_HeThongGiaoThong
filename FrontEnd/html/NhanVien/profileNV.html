<div class="container" style="max-width: 700px; margin: auto; padding: 20px;">

    <h2>Thông tin tài khoản</h2>

    <div style="margin-top:20px;">
        <p><strong>Họ tên:</strong> <span id="display-name"></span></p>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <p><strong>Vai trò:</strong> <span id="profile-role"></span></p>
        <p><strong>Ngày tạo:</strong> <span id="profile-date"></span></p>
    </div>

    <hr style="margin:30px 0;">

    <h3>Cập nhật thông tin</h3>

    <form id="form-update-profile">
        <div style="margin-bottom:10px;">
            <label>Họ tên</label><br>
            <input type="text" id="full-name" style="width:100%; padding:8px;">
        </div>

        <button type="submit">Lưu thay đổi</button>
    </form>

    <hr style="margin:30px 0;">

    <h3>Đổi mật khẩu</h3>

    <form id="form-change-password">
        <div style="margin-bottom:10px;">
            <label>Mật khẩu cũ</label><br>
            <input type="password" id="old-pass">
        </div>

        <div style="margin-bottom:10px;">
            <label>Mật khẩu mới</label><br>
            <input type="password" id="new-pass">
        </div>

        <div style="margin-bottom:10px;">
            <label>Xác nhận mật khẩu</label><br>
            <input type="password" id="confirm-pass">
        </div>

        <button type="submit">Đổi mật khẩu</button>
    </form>

    <hr style="margin:30px 0;">

    <button id="btn-back">← Quay lại</button>

</div>
